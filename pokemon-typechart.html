<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Type Matchup — Pokémon</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#11141c; --panel:#171b26; --panel2:#1d2230; --line:#272d3c;
  --ink:#eef1f7; --muted:#8b93a6;
  --def:#4d90d5; --atk:#e0632c;
}
*{box-sizing:border-box;}
html,body{margin:0;}
body{
  background:radial-gradient(1200px 600px at 50% -10%, #1a2130, #0d1017 60%);
  min-height:100vh; padding:26px 14px 40px;
  font-family:'Outfit',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  color:var(--ink); -webkit-font-smoothing:antialiased;
}
.app{max-width:1000px; margin:0 auto; background:var(--bg);
  border-radius:18px; overflow:hidden; box-shadow:0 24px 70px rgba(0,0,0,.45); border:1px solid #1e2431;}

.topbar{display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;
  padding:18px 22px; background:linear-gradient(180deg,#1b2130,#141824); border-bottom:1px solid var(--line);}
.brand{display:flex; align-items:center; gap:12px;}
.brand h1{margin:0; font-size:20px; font-weight:800; letter-spacing:-.02em;}
.brand p{margin:2px 0 0; font-size:12px; color:var(--muted);}
.pokeball{width:26px; height:26px; border-radius:50%; flex:0 0 auto; position:relative;
  background:linear-gradient(180deg,#ee4b4b 0 50%, #f4f6fb 50% 100%);
  border:2px solid #0c0f16; box-shadow:0 0 0 1px #2a3040;}
.pokeball::before{content:""; position:absolute; left:0; right:0; top:50%; height:3px; transform:translateY(-50%); background:#0c0f16;}
.pokeball::after{content:""; position:absolute; left:50%; top:50%; width:8px; height:8px; transform:translate(-50%,-50%); background:#f4f6fb; border:2px solid #0c0f16; border-radius:50%;}

.tabs{display:flex; gap:6px; background:var(--panel2); padding:4px; border-radius:11px;}
.tabs button{border:0; background:transparent; color:var(--muted); font:inherit; font-weight:600; padding:7px 14px; border-radius:8px; cursor:pointer; font-size:13px;}
.tabs button.on{background:var(--ink); color:#12151d;}

main{padding:20px 22px 6px;}
footer{padding:14px 22px 18px; color:var(--muted); font-size:11px; text-align:center;}
.lead{margin:0 0 14px; color:var(--muted); font-size:13px; line-height:1.5; max-width:64ch;}

/* ---- type badge = full-colour button (icon + name) ---- */
.badge{display:inline-flex; align-items:center; gap:6px; border:0; font-family:inherit; font-weight:700;
  border-radius:999px; line-height:1; white-space:nowrap; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.42);}
.badge.bout,.badge.bmute{text-shadow:none;}
.badge .ic{border-radius:50%; flex:0 0 auto; box-shadow:0 0 0 1.5px rgba(255,255,255,.55);}
.badge.xs{font-size:12px; padding:3px 11px 3px 3px;} .badge.xs .ic{width:17px;height:17px;}
.badge.sm{font-size:13px; padding:5px 12px 5px 4px;} .badge.sm .ic{width:21px;height:21px;}
.badge.md{font-size:16px; padding:7px 18px 7px 6px; box-shadow:0 2px 6px rgba(0,0,0,.25);} .badge.md .ic{width:29px;height:29px;}
/* vertical-chart variants: filled 2x vs hollow 1/2x vs muted 0x */
.badge.bout{background:#12151d; border:1.5px solid; box-shadow:none;}
.badge.bmute{background:#20242e; border:1px solid #2c3140; color:#8791a3;}
.badge.bmute .ic{opacity:.7; box-shadow:0 0 0 1.5px rgba(255,255,255,.28);}

/* ---- picker: icon tiles with Hoenn plate labels ---- */
.grid-pick{display:grid; grid-template-columns:repeat(6,1fr); gap:9px; margin-bottom:16px;}
.tile{display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px 4px 14px;
  background:var(--panel); border:1px solid var(--line); border-radius:15px; cursor:pointer;
  transition:transform .12s ease, opacity .12s ease, box-shadow .12s ease, border-color .12s ease;}
.tile:hover{transform:translateY(-2px);}
.tile .pic{width:54px; height:54px; border-radius:50%;}
.tile .tlbl{height:24px; image-rendering:pixelated;}
.tile .fb{font-size:12px; font-weight:700; color:var(--muted);}
.tile.dim{opacity:.34;}

.selbar{display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
  padding:12px 14px; background:var(--panel); border:1px solid var(--line); border-radius:12px; margin-bottom:6px;}
.selbar-left{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.muted{color:var(--muted); font-size:13px;}
.capmax{color:var(--muted); font-size:11px; border:1px solid var(--line); padding:2px 8px; border-radius:999px;}
.unlocked{color:#7fe0b0; font-size:11px; font-weight:700; background:rgba(60,180,120,.12); border:1px solid rgba(60,180,120,.35); padding:2px 9px; border-radius:999px;}
.clear{border:1px solid var(--line); background:transparent; color:var(--muted); font:inherit; font-size:12px; font-weight:600; padding:6px 12px; border-radius:8px; cursor:pointer;}
.clear:hover{color:var(--ink); border-color:#3a4256;}

/* ---- legend clarifier ---- */
.legend{display:flex; gap:10px; flex-wrap:wrap; margin:16px 0 4px;}
.leg{flex:1 1 240px; display:flex; gap:9px; align-items:flex-start; padding:10px 12px; border-radius:11px; background:var(--panel); border:1px solid var(--line);}
.leg .lgi{font-size:16px; line-height:1.2;}
.leg b{font-size:12px; letter-spacing:.02em;}
.leg-def b{color:var(--def);} .leg-atk b{color:var(--atk);}
.leg span{display:block; font-size:11.5px; color:var(--muted); margin-top:2px; line-height:1.4;}

/* ---- result panes ---- */
.cols{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:10px;}
.pane{background:var(--panel); border:1px solid var(--line); border-radius:14px; overflow:hidden;}
.pane-head{display:flex; align-items:flex-start; gap:10px; padding:13px 15px; border-bottom:1px solid var(--line);}
.pane-def .pane-head{background:linear-gradient(180deg, rgba(77,144,213,.16), transparent); border-left:3px solid var(--def);}
.pane-atk .pane-head{background:linear-gradient(180deg, rgba(224,99,44,.16), transparent); border-left:3px solid var(--atk);}
.pane-icon{font-size:18px; line-height:1.2;}
.pane-title{font-weight:800; font-size:13.5px; letter-spacing:.03em;}
.pane-sub{font-size:11px; color:var(--muted); margin-top:3px; line-height:1.4;}
.pane-body{padding:12px 14px; display:flex; flex-direction:column; gap:9px;}
.tier{border:1px solid var(--line); border-radius:11px; padding:10px 12px; background:var(--panel2);}
.tier-head{display:flex; align-items:center; gap:9px; margin-bottom:9px;}
.mchip{font-weight:800; font-size:13px; padding:4px 9px; border-radius:8px; min-width:38px; text-align:center;}
.tier-word{font-size:12px; color:var(--muted); text-transform:capitalize; flex:1;}
.tier-count{font-size:11px; color:var(--muted); background:#12151d; padding:2px 8px; border-radius:999px;}
.tier-types{display:flex; flex-wrap:wrap; gap:6px;}
.pane-empty{color:var(--muted); font-size:12px; padding:4px 2px;}
.pane-note{font-size:11px; color:#c7cede; padding:2px 2px 0; line-height:1.4;}

/* attacking split-by-type columns */
.atkcols{display:flex; gap:10px;}
.atkcol{flex:1; min-width:0; border:1px solid var(--line); border-radius:12px; overflow:hidden;}
.atkcol-head{display:flex; align-items:center; gap:7px; padding:8px 11px; font-weight:800; font-size:12.5px; letter-spacing:.02em; color:#fff; text-shadow:0 1px 2px rgba(0,0,0,.42);}
.atkcol-head .ic{width:19px; height:19px; border-radius:50%; box-shadow:0 0 0 1.5px rgba(255,255,255,.5);}
.atkcol-body{padding:10px 11px; display:flex; flex-direction:column; gap:8px;}

.footrow{display:flex; align-items:center; margin-top:14px;}
.neutral-toggle{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; cursor:pointer;}
.neutral-toggle input{accent-color:var(--def);}

/* ---- counters (collapsible) ---- */
.counters{margin-top:14px; border:1px solid var(--line); border-radius:14px; background:var(--panel); overflow:hidden;}
.counters-head{display:flex; align-items:center; gap:10px; width:100%; text-align:left; border:0; background:transparent; color:var(--ink); font:inherit; padding:13px 15px; cursor:pointer;}
.counters-head:hover{background:rgba(255,255,255,.02);}
.chev{transition:transform .15s ease; color:var(--muted); font-size:13px;}
.counters.open .chev{transform:rotate(90deg);}
.counters-head .ch-title{font-weight:700; font-size:13.5px;}
.counters-head .ch-sub{font-size:11px; color:var(--muted); margin-top:2px;}
.counters-body{padding:4px 15px 15px; border-top:1px solid var(--line);}
.c-explain{font-size:11.5px; color:var(--muted); line-height:1.45; margin:10px 0 12px;}
.c-explain b{color:#c7cede;}
.crow{display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid rgba(255,255,255,.05);}
.crow:last-child{border-bottom:0;}
.crank{flex:0 0 auto; width:20px; height:20px; border-radius:50%; background:var(--panel2); color:var(--muted); font-size:11px; font-weight:800; display:flex; align-items:center; justify-content:center;}
.cbadges{flex:1; display:flex; gap:5px; flex-wrap:wrap;}
.cstat{font-size:11px; font-weight:700; padding:3px 8px; border-radius:7px; white-space:nowrap;}
.c-sub{font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin:14px 0 2px;}
.c-dual-toggle{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; cursor:pointer; margin-top:12px;}
.c-dual-toggle input{accent-color:var(--atk);}

.placeholder{margin-top:22px; padding:40px 20px; text-align:center; color:var(--muted); border:1px dashed var(--line); border-radius:14px; display:flex; flex-direction:column; align-items:center; gap:12px;}
.placeholder p{margin:0; font-size:14px;}

/* ---- charts ---- */
.seg{display:inline-flex; background:var(--panel2); padding:4px; border-radius:11px; gap:4px; margin-bottom:12px;}
.seg button{border:0; background:transparent; color:var(--muted); font:inherit; font-weight:600; padding:8px 18px; border-radius:8px; cursor:pointer; font-size:13px;}
.seg button.on{background:#eef1f7; color:#12151d;}
.chart-legend{display:flex; flex-wrap:wrap; gap:12px; margin:0 0 14px; font-size:11px; color:var(--muted);}
.chart-legend span{display:inline-flex; align-items:center; gap:6px;}
.swatch{display:inline-flex; align-items:center; justify-content:center; min-width:26px; height:20px; box-sizing:border-box; border-radius:5px; font-weight:800; font-size:11px;}

/* vertical */
.vchart{display:flex; flex-direction:column; gap:7px;}
.vhead{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.06em; padding:0 4px 4px;}
.vhead span:first-child{text-align:right;}
.vhead-mid{text-align:center; color:var(--ink); font-weight:700;}
.vrow{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:12px; background:var(--panel);
  border:1px solid var(--line); border-left-width:4px; border-radius:12px; padding:10px 12px 10px 13px;}
.vrow.alt{background:#141a26;}
.vside{display:flex; flex-direction:column; gap:6px;}
.vside-l{align-items:flex-end;} .vside-r{align-items:flex-start;}
.vmid{display:flex; justify-content:center; min-width:120px;}
.side-tag{display:none; font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.06em;}
.mg{display:flex; gap:8px; align-items:baseline; flex-wrap:wrap;}
.vside-l .mg{justify-content:flex-end;}
.mg-label{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; white-space:nowrap;}
.mg-types{display:flex; gap:5px; flex-wrap:wrap;}
.vside-l .mg-types{justify-content:flex-end;}

/* grid */
.gwrap{overflow-x:auto; border:1px solid var(--line); border-radius:12px;}
.gtable{border-collapse:collapse; font-size:11px; width:100%;}
.gtable th,.gtable td{width:34px; height:34px; text-align:center; border:1px solid #0e1118;}
.gtable td{background:var(--panel); color:#fff; font-weight:700; cursor:help;}
.gtable thead th{background:#1d2230; height:48px;}
.ghead{display:flex; flex-direction:column; align-items:center; gap:2px;}
.ghead .hic{width:22px; height:22px; border-radius:50%;}
.gabbr{font-size:8px; font-weight:800; color:#cdd4e2; letter-spacing:.03em;}
.rowhead{position:sticky; left:0; z-index:1; background:#1d2230; width:42px;}
.rowhead .ghead .hic{width:20px; height:20px;}
.corner{background:var(--panel2); position:sticky; left:0; z-index:2; width:42px; font-size:9px; color:var(--muted);}
.corner-a,.corner-d{display:block; line-height:1.3; white-space:nowrap;}

@media(max-width:640px){
  main{padding:16px 14px 6px;}
  .topbar{padding:14px 16px;}
  .grid-pick{grid-template-columns:repeat(4,1fr);}
  .cols{grid-template-columns:1fr;}
  .atkcols{flex-direction:column;}
  .vrow{grid-template-columns:1fr; gap:8px;}
  .vhead{display:none;}
  .side-tag{display:block; margin-bottom:1px;}
  .vside-l,.vside-r{align-items:flex-start;}
  .vside-l .mg,.vside-l .mg-types{justify-content:flex-start;}
  .vmid{justify-content:flex-start; margin:2px 0;}
}
</style>
</head>

function lblFail(img){const s=document.createElement("span"); s.className="fb"; s.textContent=img.alt; img.replaceWith(s);}

/* ---------------- helpers ---------------- */
function textOn(hex){const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;return (0.299*r+0.587*g+0.114*b)>0.62?"#14171d":"#ffffff";}
function lighten(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);const f=.5;return `rgb(${Math.round(r+(255-r)*f)},${Math.round(g+(255-g)*f)},${Math.round(b+(255-b)*f)})`;}
function fmt(m){if(m===0)return"0\u00d7";const map={0.125:"\u215b\u00d7",0.25:"\u00bc\u00d7",0.5:"\u00bd\u00d7"};return map[m]||(m+"\u00d7");}
function effWord(m){if(m===0)return"has no effect on";if(m>1)return"is super-effective ("+fmt(m)+") against";if(m<1)return"is not very effective ("+fmt(m)+") against";return"is regular (1\u00d7) against";}
function tierColor(m){
  if(m===0)return{bg:"#20242e",fg:"#7f8798",ring:"#2c3140"};
  if(m>=4)return{bg:"#c62d2d",fg:"#fff",ring:"#e14b4b"};
  if(m>1)return{bg:"#e0632c",fg:"#fff",ring:"#f2803f"};
  if(m===1)return{bg:"#2a2f3b",fg:"#9aa2b1",ring:"#353b48"};
  if(m>0.25)return{bg:"#1f7d6c",fg:"#eafff8",ring:"#2ea48d"};
  return{bg:"#2b5db0",fg:"#eef4ff",ring:"#3f76cf"};
}
function tierWord(m,mode){
  if(mode==="defend"){if(m===0)return"no damage";if(m>1)return"extra damage";return"reduced damage";}
  if(m===0)return"no effect";if(m>1)return"super effective";return"not very effective";
}
function goodColor(v,higherBetter){
  const good=higherBetter?v>1:v<1, bad=higherBetter?v<1:v>1;
  if(good)return{bg:"#1f6d4f",fg:"#d9ffe9"};
  if(bad)return{bg:"#7a2b2b",fg:"#ffe1e1"};
  return{bg:"#2a2f3b",fg:"#9aa2b1"};
}
function toTiers(map,includeNeutral){
  const b={};
  Object.keys(map).forEach(t=>{const m=map[t]; if(!includeNeutral&&m===1)return; (b[m]=b[m]||[]).push(t);});
  return Object.keys(b).map(Number).sort((x,y)=>y-x).map(m=>({mult:m,types:b[m]}));
}
function badge(t,cls){const c=COLOR[t];return `<span class="badge ${cls}" style="background:${c}"><img class="ic" src="${ICON[t]}" alt=""/>${t}</span>`;}
/* variant badges for the vertical chart */
function vbadge(t,variant){
  const c=COLOR[t];
  if(variant==="out") return `<span class="badge xs bout" style="border-color:${c};color:${lighten(c)}"><img class="ic" src="${ICON[t]}" alt=""/>${t}</span>`;
  if(variant==="mute") return `<span class="badge xs bmute"><img class="ic" src="${ICON[t]}" alt=""/>${t}</span>`;
  return `<span class="badge xs" style="background:${c}"><img class="ic" src="${ICON[t]}" alt=""/>${t}</span>`;
}
function labelOf(sel){return sel.join(" / ");}
function nameColored(sel,sep){return sel.map(t=>`<b style="color:${lighten(COLOR[t])}">${t}</b>`).join(sep);}

let state={tab:"calc",selected:[],showNeutral:false,view:"vertical",countersOpen:false,countersDual:false,
           unlocked:false,spamStreak:0,lastClick:0};

function set(patch){Object.assign(state,patch);render();}

/* ---------------- calculator ---------------- */
function tiersHTML(map,mode){
  const tiers=toTiers(map,state.showNeutral);
  if(tiers.length===0)return `<p class="pane-empty">All neutral (1\u00d7) here.</p>`;
  return tiers.map(function(o){
    const c=tierColor(o.mult);
    return `<div class="tier">
      <div class="tier-head">
        <span class="mchip" style="background:${c.bg};color:${c.fg};box-shadow:0 0 0 1px ${c.ring} inset">${fmt(o.mult)}</span>
        <span class="tier-word">${tierWord(o.mult,mode)}</span>
        <span class="tier-count">${o.types.length}</span>
      </div>
      <div class="tier-types">${o.types.map(t=>badge(t,"sm")).join("")}</div>
    </div>`;
  }).join("");
}
function attackColsHTML(sel){
  return `<div class="atkcols">`+sel.map(function(atk){
    const c=COLOR[atk], tc="#fff", m={};
    TYPES.forEach(d=>m[d]=eff(atk,d));
    return `<div class="atkcol" style="border-color:${c};background:${c}1c">
      <div class="atkcol-head" style="background:${c};color:${tc}"><img class="ic" src="${ICON[atk]}" alt=""/>${atk}</div>
      <div class="atkcol-body">${tiersHTML(m,"attack")}</div>
    </div>`;
  }).join("")+`</div>`;
}
function scoreCounter(C,O){
  const incoming=Math.max.apply(null,O.map(o=>C.reduce((p,c)=>p*eff(o,c),1)));
  const outgoing=Math.max.apply(null,C.map(c=>O.reduce((p,o)=>p*eff(c,o),1)));
  return {C:C,incoming:incoming,outgoing:outgoing};
}
const cmpCounter=(a,b)=>(a.incoming-b.incoming)||(b.outgoing-a.outgoing);
function counterRowHTML(item,rank){
  const dc=goodColor(item.incoming,false), oc=goodColor(item.outgoing,true);
  return `<div class="crow">
    <span class="crank">${rank}</span>
    <div class="cbadges">${item.C.map(t=>badge(t,"sm")).join("")}</div>
    <span class="cstat" style="background:${dc.bg};color:${dc.fg}" title="Damage it takes">takes ${fmt(item.incoming)}</span>
    <span class="cstat" style="background:${oc.bg};color:${oc.fg}" title="Damage it deals">deals ${fmt(item.outgoing)}</span>
  </div>`;
}
function countersHTML(sel){
  const label=labelOf(sel);
  const singles=TYPES.map(t=>scoreCounter([t],sel)).sort(cmpCounter).slice(0,6);
  let body="";
  if(state.countersOpen){
    let duals="";
    if(state.countersDual){
      const arr=[];
      for(let i=0;i<TYPES.length;i++)for(let j=i+1;j<TYPES.length;j++)arr.push(scoreCounter([TYPES[i],TYPES[j]],sel));
      arr.sort(cmpCounter);
      duals=`<div class="c-sub">Best dual-type combos</div>`+arr.slice(0,6).map((it,i)=>counterRowHTML(it,i+1)).join("");
    }
    body=`<div class="counters-body">
      <p class="c-explain">Treats <b>${label}</b> as the opponent. Ranked by how little damage they <b>take</b> from a ${label} attack, then how hard they <b>hit back</b>. <b>takes</b> = damage received \u00b7 <b>deals</b> = damage dealt to it.</p>
      ${singles.map((it,i)=>counterRowHTML(it,i+1)).join("")}
      <label class="c-dual-toggle"><input type="checkbox" id="cdual" ${state.countersDual?"checked":""}/> Include dual-type combos</label>
      ${duals}
    </div>`;
  }
  return `<div class="counters ${state.countersOpen?"open":""}">
    <button class="counters-head" id="ctoggle">
      <span class="chev">\u25b6</span>
      <span><span class="ch-title">Best types to counter a ${label} Pok\u00e9mon</span><span class="ch-sub">${state.countersOpen?"":"Tap to see what beats it"}</span></span>
    </button>
    ${body}
  </div>`;
}
function calcHTML(){
  const sel=state.selected;
  const picker=TYPES.map(function(t){
    const on=sel.includes(t);
    const dim=sel.length>0&&!on?"dim":"";
    const style=on?`border-color:${COLOR[t]};box-shadow:0 0 0 2px ${COLOR[t]} inset, 0 0 16px -3px ${COLOR[t]};`:"";
    return `<button class="tile ${on?"sel":""} ${dim}" data-type="${t}" style="${style}"><img class="pic" src="${ICON[t]}" alt=""/><img class="tlbl" src="${LABEL[t]}" alt="${t}" onerror="lblFail(this)"/></button>`;
  }).join("");

  const capNote = state.unlocked
      ? '<span class="unlocked">\u{1F513} unlimited</span>'
      : (sel.length>=CAP ? '<span class="capmax">max 2 \u00b7 deselect one to swap</span>' : '');
  const selbar=`<div class="selbar">
    <div class="selbar-left">${sel.length===0?'<span class="muted">No type selected</span>':'<span class="muted">Selected:</span>'+sel.map(t=>badge(t,"sm")).join("")+capNote}</div>
    ${sel.length>0?'<button class="clear" id="clear">Clear</button>':""}
  </div>`;

  if(sel.length===0){
    return `<p class="lead">Tap up to two types to see both matchup views at once.</p><div class="grid-pick">${picker}</div>${selbar}
      <div class="placeholder"><span class="pokeball"></span><p>Select a type to begin.</p></div>`;
  }

  const label=labelOf(sel);
  const multi=sel.length>1;
  const defMap={}; TYPES.forEach(a=>{defMap[a]=sel.reduce((x,d)=>x*eff(a,d),1);});
  const defNote=multi?`<p class="pane-note">Types stack \u2014 matchups multiply (source of 4\u00d7 / \u00bc\u00d7 / 0\u00d7).</p>`:"";

  const atkBody = multi ? attackColsHTML(sel) : tiersHTML((function(){const m={};TYPES.forEach(d=>m[d]=eff(sel[0],d));return m;})(),"attack");
  const atkSub = multi ? `You're attacking using a ${nameColored(sel," or ")} move. Each type is shown on its own.`
                       : `You're attacking using a ${nameColored(sel," or ")} move. <b>Higher = super-effective.</b>`;

  const panes=`<div class="cols">
    <section class="pane pane-def">
      <div class="pane-head"><span class="pane-icon">\u{1F6E1}\u{FE0F}</span>
        <div><div class="pane-title">DEFENDING</div><div class="pane-sub">You're attacking a ${nameColored(sel," / ")} Pok\u00e9mon. <b>Higher = your best move against it.</b></div></div>
      </div>
      <div class="pane-body">${tiersHTML(defMap,"defend")}${defNote}</div>
    </section>
    <section class="pane pane-atk">
      <div class="pane-head"><span class="pane-icon">\u2694\u{FE0F}</span>
        <div><div class="pane-title">ATTACKING</div><div class="pane-sub">${atkSub}</div></div>
      </div>
      <div class="pane-body">${atkBody}</div>
    </section>
  </div>
  <div class="footrow"><label class="neutral-toggle"><input type="checkbox" id="neutral" ${state.showNeutral?"checked":""}/> Show neutral (1\u00d7) matchups</label></div>`;

  return `<p class="lead">Tap up to two types to see both matchup views at once.</p><div class="grid-pick">${picker}</div>${selbar}${panes}${countersHTML(sel)}`;
}

/* ---------------- charts ---------------- */
function miniGroup(label,types,color,variant){
  if(types.length===0)return"";
  return `<div class="mg"><span class="mg-label" style="color:${color}">${label}</span><div class="mg-types">${types.map(t=>vbadge(t,variant)).join("")}</div></div>`;
}
function verticalHTML(){
  const rows=TYPES.map(function(t,i){
    const def={},off={};
    TYPES.forEach(function(o){const dm=eff(o,t); if(dm!==1)(def[dm]=def[dm]||[]).push(o); const om=eff(t,o); if(om!==1)(off[om]=off[om]||[]).push(o);});
    return `<div class="vrow ${i%2?'alt':''}" style="border-left-color:${COLOR[t]}">
      <div class="vside vside-l">
        <span class="side-tag">\u{1F6E1}\uFE0F Hit by</span>
        ${miniGroup("2\u00d7 weak",def[2]||[],"#f2803f","solid")}
        ${miniGroup("\u00bd\u00d7 resists",def[0.5]||[],"#2ea48d","out")}
        ${miniGroup("0\u00d7 immune",def[0]||[],"#8791a3","mute")}
      </div>
      <div class="vmid">${badge(t,"md")}</div>
      <div class="vside vside-r">
        <span class="side-tag">\u2694\uFE0F Hits</span>
        ${miniGroup("2\u00d7 strong vs",off[2]||[],"#f2803f","solid")}
        ${miniGroup("\u00bd\u00d7 weak vs",off[0.5]||[],"#2ea48d","out")}
        ${miniGroup("0\u00d7 no effect",off[0]||[],"#8791a3","mute")}
      </div>
    </div>`;
  }).join("");
  return `<div class="chart-legend">
      <span><span class="swatch" style="background:#e0632c;color:#fff">2\u00d7</span> filled = super-effective</span>
      <span><span class="swatch" style="border:1.5px solid #2ea48d;color:#8fe4d2">\u00bd\u00d7</span> outlined = resisted</span>
      <span><span class="swatch" style="background:#20242e;color:#8791a3">0\u00d7</span> muted = no effect</span>
    </div>
    <div class="vchart"><div class="vhead"><span>Type attacking it &rarr;</span><span class="vhead-mid">Type</span><span>&rarr; Type it attacks</span></div>${rows}</div>`;
}
function gridHTML(){
  const cell=m=>m===2?{t:"2",bg:"#4caf2f",fg:"#fff"}:m===0.5?{t:"\u00bd",bg:"#b32020",fg:"#fff"}:m===0?{t:"0",bg:"#2c313c",fg:"#c9a227"}:null;
  const head=TYPES.map(d=>`<th title="${d}"><div class="ghead"><img class="hic" src="${ICON[d]}" alt=""/><span class="gabbr">${ABBR[d]}</span></div></th>`).join("");
  const rows=TYPES.map(function(a){
    const cells=TYPES.map(function(d){
      const m=eff(a,d); const c=cell(m);
      const tip=`${a} ${effWord(m)} ${d}`;
      return c?`<td title="${tip}" style="background:${c.bg};color:${c.fg}">${c.t}</td>`:`<td title="${tip}"></td>`;
    }).join("");
    return `<tr><th class="rowhead" title="${a}"><div class="ghead"><img class="hic" src="${ICON[a]}" alt=""/><span class="gabbr">${ABBR[a]}</span></div></th>${cells}</tr>`;
  }).join("");
  return `<div class="chart-legend">
      <span><span class="swatch" style="background:#4caf2f;color:#fff">2</span> super-effective</span>
      <span><span class="swatch" style="background:#b32020;color:#fff">\u00bd</span> not very</span>
      <span><span class="swatch" style="background:#2c313c;color:#c9a227">0</span> no effect</span>
      <span>blank = 1\u00d7 \u00b7 hover a cell for details</span>
    </div>
    <div class="gwrap"><table class="gtable"><thead><tr><th class="corner"><span class="corner-a">Attack &darr;</span><span class="corner-d">Defense &rarr;</span></th>${head}</tr></thead><tbody>${rows}</tbody></table></div>`;
}
function chartHTML(){
  return `<div class="seg">
    <button data-view="vertical" class="${state.view==="vertical"?"on":""}">Vertical</button>
    <button data-view="grid" class="${state.view==="grid"?"on":""}">Grid</button>
  </div>${state.view==="vertical"?verticalHTML():gridHTML()}`;
}

/* ---------------- shell + wiring ---------------- */
function render(){
  app.innerHTML=`
    <header class="topbar">
      <div class="brand"><span class="pokeball"></span>
        <div><h1>Type Matchup</h1><p>Weaknesses, resistances &amp; coverage</p></div>
      </div>
      <nav class="tabs">
        <button data-tab="calc" class="${state.tab==="calc"?"on":""}">Calculator</button>
        <button data-tab="chart" class="${state.tab==="chart"?"on":""}">Type chart</button>
      </nav>
    </header>
    <main>${state.tab==="calc"?calcHTML():chartHTML()}</main>
    <footer>Gen 6+ type chart \u00b7 includes Fairy</footer>`;
  wire();
}
function wire(){
  app.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>set({tab:b.dataset.tab}));
  app.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>set({view:b.dataset.view}));
  app.querySelectorAll(".tile").forEach(b=>b.onclick=()=>{
    const t=b.dataset.type, s=state.selected, now=Date.now();
    let streak=(now-state.lastClick<500)?state.spamStreak+1:1;
    let unlocked=state.unlocked;
    if(streak>=10) unlocked=true;
    let sel;
    if(s.includes(t)) sel=s.filter(x=>x!==t);
    else if(unlocked || s.length<CAP) sel=s.concat(t);
    else sel=s;
    set({selected:sel,lastClick:now,spamStreak:streak,unlocked:unlocked});
  });
  const clr=app.querySelector("#clear"); if(clr)clr.onclick=()=>set({selected:[],countersOpen:false,countersDual:false});
  const nt=app.querySelector("#neutral"); if(nt)nt.onchange=e=>set({showNeutral:e.target.checked});
  const ct=app.querySelector("#ctoggle"); if(ct)ct.onclick=()=>set({countersOpen:!state.countersOpen});
  const cd=app.querySelector("#cdual"); if(cd)cd.onchange=e=>set({countersDual:e.target.checked});
}
render();
</script>
</body>
</html>
